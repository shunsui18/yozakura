      <animate attributeName="opacity" values="0.5;1;0.1;0.7;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.8" x2="0" y2="3.8" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.9;0" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.8" y1="0" x2="3.8" y2="0" stroke="#e8eef8" stroke-width="0.5" opacity="0">
