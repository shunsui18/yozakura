  <g transform="translate(108,148)" fill="#e8eef8">
    <circle r="0.7">
      <animate attributeName="r"       values="0.7;2.0;0.2;1.2;0.7" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.1;1;0.4"   dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-2.8" x2="0" y2="2.8" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.9;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="-2.8" y1="0" x2="2.8" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.9;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(330,160)" fill="#e8eef8">
    <circle r="0.7">
      <animate attributeName="r"       values="0.7;2.1;0.3;1.3;0.7" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.1;0.8;0.4"   dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(116,192)" fill="#e8eef8">
    <circle r="0.6">
      <animate attributeName="r"       values="0.6;1.8;0.2;1.1;0.6" dur="6s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.1;0.9;0.4"   dur="6s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-2.6" x2="0" y2="2.6" stroke="#e8eef8" stroke-width="0.35" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="4s" repeatCount="indefinite"/>
    </line>
    <line x1="-2.6" y1="0" x2="2.6" y2="0" stroke="#e8eef8" stroke-width="0.35" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="4s" repeatCount="indefinite"/>
    </line>
