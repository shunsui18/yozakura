    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.5;0" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(290,72)" fill="#e8eef8">
    <circle r="0.8">
      <animate attributeName="r"       values="0.8;2.5;0.3;1.5;0.8" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.1;0.8;0.5"   dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(318,96)" fill="#e8eef8">
    <circle r="0.9">
      <animate attributeName="r"       values="0.9;2.3;0.2;1.4;0.9" dur="6s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.1;0.9;0.4"   dur="6s" begin="3s" repeatCount="indefinite"/>
