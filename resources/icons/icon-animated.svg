<!-- Moon arc: 60s matches master loop -->
<path d="M228,72 A82,82 0 1,0 228,202 A74,74 0 0,1 228,72 Z" fill="#8898c8">
  <animate attributeName="opacity" values="0.20;0.32;0.14;0.28;0.20;0.32;0.14;0.28;0.20" dur="60s" repeatCount="indefinite"/>
</path>

<!-- Petals: exactly 60s rotation = 1 full loop -->
<g>
  <animateTransform attributeName="transform" type="rotate" from="0 200 188" to="360 200 188" dur="60s" repeatCount="indefinite"/>
  <path d="M200,188 C166,172 154,126 180,100 Q200,116 220,100 C246,126 234,172 200,188" fill="#b898d0" fill-opacity="0.90"/>
  <g transform="rotate(72,200,188)">
    <path d="M200,188 C166,172 154,126 180,100 Q200,116 220,100 C246,126 234,172 200,188" fill="#e098a0" fill-opacity="0.90"/>
  </g>
  <g transform="rotate(144,200,188)">
    <path d="M200,188 C166,172 154,126 180,100 Q200,116 220,100 C246,126 234,172 200,188" fill="#f2d4b8" fill-opacity="0.90"/>
  </g>
  <g transform="rotate(216,200,188)">
    <path d="M200,188 C166,172 154,126 180,100 Q200,116 220,100 C246,126 234,172 200,188" fill="#7ab0c8" fill-opacity="0.90"/>
  </g>
  <g transform="rotate(288,200,188)">
    <path d="M200,188 C166,172 154,126 180,100 Q200,116 220,100 C246,126 234,172 200,188" fill="#9080c0" fill-opacity="0.90"/>
  </g>
</g>

<!-- Stamen dots: 4s and 6s both divide 60 -->
<g fill="#e8d870">
  <g transform="translate(200,170)"><circle r="2.4"><animate attributeName="r" values="2.4;3.0;2.4" dur="4s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(213,175)"><circle r="2.4"><animate attributeName="r" values="2.4;2.9;2.4" dur="6s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(218,188)"><circle r="2.4"><animate attributeName="r" values="2.4;3.1;2.4" dur="4s" begin="2s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(213,201)"><circle r="2.4"><animate attributeName="r" values="2.4;2.8;2.4" dur="6s" begin="3s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(200,206)"><circle r="2.4"><animate attributeName="r" values="2.4;3.0;2.4" dur="4s" begin="1s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(187,201)"><circle r="2.4"><animate attributeName="r" values="2.4;2.9;2.4" dur="6s" begin="2s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(182,188)"><circle r="2.4"><animate attributeName="r" values="2.4;3.1;2.4" dur="4s" begin="3s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(187,175)"><circle r="2.4"><animate attributeName="r" values="2.4;2.8;2.4" dur="6s" begin="1s" repeatCount="indefinite"/></circle></g>
</g>

<!-- Center glow: 4s divides 60 -->
<circle cx="200" cy="188" r="10" fill="#e8eef8">
  <animate attributeName="fill-opacity" values="0.95;0.6;0.95" dur="4s" repeatCount="indefinite"/>
  <animate attributeName="r" values="10;11.5;10" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="188" r="5.5" fill="#f2d4b8">
  <animate attributeName="fill-opacity" values="0.88;0.5;0.88" dur="4s" repeatCount="indefinite"/>
</circle>

<!-- ── Falling petals: 10s each, 60/10=6 full cycles per loop ───────────── -->
<!-- Petal 2 begins at -5s (half-cycle): at t=60 both have done exact whole cycles -->
<g clip-path="url(#circleClip)">

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="295,60; 280,130; 300,195; 282,265; 295,340"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
      dur="10s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="20;75;130;185;240"
        keyTimes="0;0.25;0.5;0.75;1"
        calcMode="spline"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        dur="10s" repeatCount="indefinite"/>
      <path transform="scale(0.68)"
        d="M0,0 C-22,-11 -30,-42 -12,-60 Q0,-48 12,-60 C30,-42 22,-11 0,0"
        fill="#d8aac4">
        <animate attributeName="fill-opacity"
          values="0;0.60;0.58;0.55;0.45;0"
          keyTimes="0;0.08;0.35;0.60;0.78;1"
          dur="10s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="255,50; 242,125; 262,198; 244,268; 258,345"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
      dur="10s" begin="-5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-10;45;100;158;215"
        keyTimes="0;0.25;0.5;0.75;1"
        calcMode="spline"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        dur="10s" begin="-5s" repeatCount="indefinite"/>
      <path transform="scale(0.60)"
        d="M0,0 C-22,-11 -30,-42 -12,-60 Q0,-48 12,-60 C30,-42 22,-11 0,0"
        fill="#b898d0">
        <animate attributeName="fill-opacity"
          values="0;0.55;0.52;0.48;0.38;0"
          keyTimes="0;0.08;0.35;0.60;0.78;1"
          dur="10s" begin="-5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

</g>

<text x="200" y="304" text-anchor="middle" font-family="'Shippori Mincho', Georgia, serif" font-size="32" font-weight="400" fill="#faf9f5">Yozakura</text>
<text x="200" y="330" text-anchor="middle" font-family="'Shippori Mincho', Georgia, serif" font-size="12" font-weight="400" letter-spacing="7" fill="#c2c0b6">夜桜</text>

</svg>
