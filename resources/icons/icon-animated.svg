<svg width="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

<!--
  Master loop: 60s
  All animation durations are factors of 60: 3,4,5,6,10,12,15,20,30,60
  All begin offsets are multiples of their own duration
  Petal rotation: 60s (1 full cycle = master loop)
  Falling petals: 10s each, petal-2 begin="-5s" (half-cycle offset, still whole cycles at t=60)
-->

<defs>
  <clipPath id="circleClip">
    <circle cx="200" cy="200" r="195"/>
  </clipPath>
</defs>

<circle cx="200" cy="200" r="195" fill="#2a3450"/>

<!-- ── Stars ─────────────────────────────────────────────────────────────── -->
<g clip-path="url(#circleClip)">

  <g transform="translate(136,88)" fill="#e8eef8">
    <circle r="1.2">
      <animate attributeName="r"       values="1.2;2.8;0.5;1.9;1.2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.15;0.9;0.5"  dur="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0;0;0" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0;0;0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(168,62)" fill="#e8eef8">
    <circle r="0.9">
      <animate attributeName="r"       values="0.9;2.4;0.3;1.5;0.9" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.1;0.8;0.5"   dur="6s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(210,52)" fill="#e8eef8">
    <circle r="0.8">
      <animate attributeName="r"       values="0.8;2.2;0.2;1.4;0.8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.1;0.9;0.4"   dur="3s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.2" x2="0" y2="3.2" stroke="#e8eef8" stroke-width="0.4" opacity="0">
