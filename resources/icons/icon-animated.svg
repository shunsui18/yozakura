  <g transform="translate(152,82)" fill="#e8eef8">
    <circle r="0.6">
      <animate attributeName="r"       values="0.6;1.9;0.2;1.2;0.6" dur="4s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.1;1;0.4"   dur="4s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-2.8" x2="0" y2="2.8" stroke="#e8eef8" stroke-width="0.35" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </line>
    <line x1="-2.8" y1="0" x2="2.8" y2="0" stroke="#e8eef8" stroke-width="0.35" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(80,110)" fill="#e8eef8">
    <circle r="0.7" opacity="0.3">
      <animate attributeName="r"       values="0.7;2.2;0.2;1.3;0.7" dur="5s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.1;0.7;0.3"   dur="5s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.2" x2="0" y2="3.2" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="5s" begin="4s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.2" y1="0" x2="3.2" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="5s" begin="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(340,120)" fill="#e8eef8">
    <circle r="0.8" opacity="0.3">
      <animate attributeName="r"       values="0.8;2.4;0.3;1.5;0.8" dur="6s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.1;0.8;0.3"   dur="6s" begin="5s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.4" x2="0" y2="3.4" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="5s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.4" y1="0" x2="3.4" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(190,35)" fill="#e8eef8">
    <circle r="0.9" opacity="0.3">
      <animate attributeName="r"       values="0.9;2.6;0.2;1.6;0.9" dur="5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.1;0.7;0.3"   dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3.8" x2="0" y2="3.8" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.9;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="-3.8" y1="0" x2="3.8" y2="0" stroke="#e8eef8" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.9;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#e8eef8" stroke-width="0.45" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.6;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#e8eef8" stroke-width="0.45" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.6;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(355,200)" fill="#e8eef8">
    <circle r="0.7" opacity="0.3">
      <animate attributeName="r"       values="0.7;2.0;0.2;1.3;0.7" dur="5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.1;0.8;0.3"   dur="5s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-2.8" x2="0" y2="2.8" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="5s" begin="3s" repeatCount="indefinite"/>
    </line>
    <line x1="-2.8" y1="0" x2="2.8" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0;0" dur="5s" begin="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <g transform="translate(60,230)" fill="#e8eef8">
    <circle r="0.65" opacity="0.25">
      <animate attributeName="r"       values="0.65;2.1;0.2;1.2;0.65" dur="6s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.9;0.05;0.7;0.25" dur="6s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#e8eef8" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" dur="6s" begin="1s" repeatCount="indefinite"/>
    </line>
